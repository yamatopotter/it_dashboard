openapi: 3.1.0

info:
  title: WatchIT Tower Monitoramento — API
  version: "1.0.0"
  description: |
    API REST do WatchIT Tower Monitoramento — dashboard local de monitoramento de infraestrutura de TI.

    ## Autenticação

    A maioria dos endpoints exige uma sessão NextAuth ativa (cookie de sessão JWT).
    Faça login em `POST /api/auth/callback/credentials` e inclua o cookie `next-auth.session-token`
    nas requisições subsequentes.

    ### Exceções (sem autenticação de sessão)
    - `GET /api/health` — público, sem autenticação
    - `POST /api/links/{id}/up` e `POST /api/links/{id}/down` — autenticados por HMAC-SHA256 via header `x-webhook-token` ou query string `?token=`

    ## Rate Limiting
    O endpoint de login (`POST /api/auth/callback/credentials`) tem rate limit de
    **10 tentativas por IP em 15 minutos**.

servers:
  - url: http://localhost:3000
    description: Desenvolvimento local

tags:
  - name: Autenticação
    description: Login e sessão
  - name: Dispositivos
    description: CRUD de dispositivos monitorados
  - name: Status
    description: Histórico de status e métricas de dispositivos
  - name: Links
    description: Gerenciamento de links WAN e tráfego
  - name: Incidentes
    description: Incidentes e linha do tempo de eventos
  - name: Admin
    description: Administração do sistema — auditoria, limpeza e configuração (requer papel ADMIN)
  - name: Usuários
    description: CRUD de usuários do dashboard (requer papel ADMIN)
  - name: Sistema
    description: Saúde do sistema, dados do overview e versão do build

# ─── Componentes reutilizáveis ──────────────────────────────────────────────
components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: next-auth.session-token
      description: Cookie de sessão JWT gerado pelo NextAuth após login bem-sucedido.

    webhookToken:
      type: apiKey
      in: header
      name: x-webhook-token
      description: |
        Token HMAC-SHA256 gerado com `WEBHOOK_SECRET + linkId`.
        Pode ser enviado como header `x-webhook-token` ou query string `?token=`.

  schemas:
    # ── Enums ──────────────────────────────────────────────────────────────
    DeviceType:
      type: string
      enum: [MIKROTIK, DVR, CAMERA, OTHER, UNIFI_AP, OMADA_AP]
      description: Tipo do dispositivo.

    NoteSeverity:
      type: string
      enum: [INFO, WARNING, HIGH, CRITICAL]
      description: Severidade da nota.

    NoteCategory:
      type: string
      enum: [SECURITY, OPERATIONAL, GENERAL]
      description: Categoria da nota.

    NoteStatus:
      type: string
      enum: [OPEN, IN_PROGRESS, RESOLVED]
      description: Status de resolução da nota.

    LinkEventType:
      type: string
      enum: [UP, DOWN]
      description: Tipo do evento de link.

    TimelineEventKind:
      type: string
      enum: [DEVICE_OFFLINE, DEVICE_ONLINE, DEVICE_HIGH_LATENCY, LINK_DOWN, LINK_UP]
      description: |
        Tipo do evento na linha do tempo unificada.
        - `DEVICE_OFFLINE` — device ficou offline
        - `DEVICE_ONLINE` — device se recuperou
        - `DEVICE_HIGH_LATENCY` — ping ultrapassou 150ms pela primeira vez
        - `LINK_DOWN` — link WAN ficou offline (via webhook)
        - `LINK_UP` — link WAN voltou a ficar online (via webhook)

    SegmentState:
      type: string
      enum: [online, offline, degraded, empty]
      description: |
        Estado de um segmento horário de disponibilidade de link.
        - `online` — ficou online durante a hora inteira
        - `offline` — ficou offline ao final da hora
        - `degraded` — teve evento DOWN mas terminou UP
        - `empty` — sem dados (antes do período rastreado)

    # ── Modelos principais ─────────────────────────────────────────────────
    Device:
      type: object
      description: Dispositivo monitorado com todas as suas configurações de protocolo.
      properties:
        id:
          type: string
          description: CUID único do dispositivo.
          example: "clxyz123456789"
        name:
          type: string
          example: "Mikrotik Matriz"
        ip:
          type: string
          format: ipv4
          example: "192.168.1.1"
        type:
          $ref: "#/components/schemas/DeviceType"
        location:
          type: string
          nullable: true
          example: "Rack Sala de TI"
        notes:
          type: string
          nullable: true
          example: "Roteador principal. Não reiniciar sem aviso."
        pingEnabled:
          type: boolean
          default: true
        httpEnabled:
          type: boolean
          default: false
        httpPort:
          type: integer
          nullable: true
          minimum: 1
          maximum: 65535
          example: 80
        httpPath:
          type: string
          default: "/"
          example: "/status"
        snmpEnabled:
          type: boolean
          default: false
        snmpCommunity:
          type: string
          default: "public"
        snmpPort:
          type: integer
          default: 161
        routerosEnabled:
          type: boolean
          default: false
        routerosUser:
          type: string
          nullable: true
          example: "admin"
        routerosPass:
          type: string
          nullable: true
          writeOnly: true
          example: "senha123"
        routerosPort:
          type: integer
          default: 8728
        unifiEnabled:
          type: boolean
          default: false
          description: Se o monitoramento UniFi está habilitado (apenas para tipo UNIFI_AP).
        unifiAuthMethod:
          type: string
          nullable: true
          enum: [apikey, userpass]
          description: |
            Método de autenticação no controlador UniFi.
            - `apikey` — Integration API (X-API-KEY); não expõe RSSI/SSID por cliente
            - `userpass` — Inform API (usuário/senha); expõe RSSI, SSID e canal por cliente
        unifiApiKey:
          type: string
          nullable: true
          writeOnly: true
          description: Chave de API para autenticação via Integration API (nunca retornada na leitura).
        unifiUser:
          type: string
          nullable: true
          writeOnly: true
          description: Usuário para autenticação via Inform API (nunca retornado na leitura).
        unifiPass:
          type: string
          nullable: true
          writeOnly: true
          description: Senha para autenticação via Inform API (nunca retornada na leitura).
        hasUnifiCredentials:
          type: boolean
          readOnly: true
          description: Indica se credenciais UniFi estão armazenadas (substitui os campos de credencial na leitura).
        unifiControllerIp:
          type: string
          nullable: true
          format: ipv4
          example: "192.168.1.200"
          description: IP do controlador UniFi (quando diferente do IP do AP).
        unifiPort:
          type: integer
          nullable: true
          default: 443
          description: Porta HTTPS do controlador UniFi.
        unifiSite:
          type: string
          nullable: true
          default: "default"
          description: Nome ou ID do site no controlador UniFi.
        unifiTlsVerify:
          type: boolean
          nullable: true
          default: false
          description: Se deve validar o certificado TLS do controlador (desabilite para certificados autoassinados).
        omadaEnabled:
          type: boolean
          default: false
          description: Se o monitoramento Omada está habilitado (apenas para tipo OMADA_AP).
        omadaClientId:
          type: string
          nullable: true
          writeOnly: true
          description: OAuth2 client_id da Northbound API do Omada (nunca retornado na leitura).
        omadaClientSecret:
          type: string
          nullable: true
          writeOnly: true
          description: OAuth2 client_secret da Northbound API do Omada (nunca retornado na leitura).
        hasOmadaCredentials:
          type: boolean
          readOnly: true
          description: Indica se credenciais Omada estão armazenadas (substitui os campos de credencial na leitura).
        omadacId:
          type: string
          nullable: true
          description: omadacId do controller Omada (descoberto via API de sites).
          example: "abc123def456"
        omadaSite:
          type: string
          nullable: true
          description: Nome do site Omada (apenas para exibição).
          example: "Sede"
        omadaSiteId:
          type: string
          nullable: true
          description: ID do site Omada (usado diretamente nas chamadas de API).
          example: "site-abc123"
        omadaControllerIp:
          type: string
          nullable: true
          format: ipv4
          example: "10.0.0.19"
          description: IP do Omada Controller (quando diferente do IP do AP).
        omadaTlsVerify:
          type: boolean
          default: true
          description: Se deve validar o certificado TLS do controller (desabilite para certificados autoassinados).
        alertWebhookUrl:
          type: string
          format: uri
          nullable: true
          description: URL para receber alertas quando o dispositivo atinge `alertThreshold` falhas consecutivas. Suporta Slack, Teams, Telegram e qualquer endpoint HTTP/HTTPS.
          example: "https://hooks.slack.com/services/T00/B00/xxx"
        alertThreshold:
          type: integer
          minimum: 1
          maximum: 100
          default: 3
          description: Número de falhas consecutivas necessárias para disparar o alerta. Cooldown de 1 hora entre disparos.
        lastAlertAt:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Timestamp do último alerta enviado (usado para controle de cooldown).
        checkInterval:
          type: integer
          description: Intervalo entre checagens em segundos (mínimo 10, máximo 3600).
          default: 60
          minimum: 10
          maximum: 3600
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        currentStatus:
          $ref: "#/components/schemas/DeviceStatus"
          nullable: true
      required: [id, name, ip, type, pingEnabled, httpEnabled, snmpEnabled, routerosEnabled, checkInterval, createdAt, updatedAt]

    DeviceStatus:
      type: object
      description: Resultado mais recente da checagem do dispositivo (upsertado a cada ciclo).
      properties:
        id:
          type: string
        deviceId:
          type: string
        isOnline:
          type: boolean
          description: Se o dispositivo respondeu ao último check.
        pingMs:
          type: integer
          nullable: true
          description: Latência do ping em milissegundos.
          example: 3
        httpOk:
          type: boolean
          nullable: true
          description: Se o HTTP check retornou código 2xx.
        uptime:
          type: integer
          nullable: true
          description: Uptime do dispositivo em segundos (via SNMP ou RouterOS).
        cpuLoad:
          type: number
          format: float
          nullable: true
          description: Uso de CPU em percentual (0-100).
          example: 12.5
        memoryUsed:
          type: number
          format: float
          nullable: true
          description: Uso de memória em percentual (0-100).
          example: 45.2
        checkedAt:
          type: string
          format: date-time
          description: Timestamp da última checagem.
        unifiData:
          $ref: "#/components/schemas/UnifiResult"
          nullable: true
          description: Dados do AP UniFi (presente apenas para dispositivos do tipo UNIFI_AP).
        omadaData:
          $ref: "#/components/schemas/OmadaResult"
          nullable: true
          description: Dados do AP Omada (presente apenas para dispositivos do tipo OMADA_AP).
      required: [id, deviceId, isOnline, checkedAt]

    UnifiSSID:
      type: object
      description: Informações de uma rede Wi-Fi (SSID/rádio) publicada pelo AP.
      properties:
        ssid:
          type: string
          example: "HomeNet"
        band:
          type: string
          description: Banda de rádio (2.4 GHz, 5 GHz, 6 GHz).
          example: "5 GHz"
        channel:
          type: integer
          description: Canal de transmissão.
          example: 36
        clients:
          type: integer
          description: Clientes conectados nesta combinação SSID/rádio.
          example: 3
        txBytes:
          type: integer
          description: Total de bytes transmitidos neste VAP (cumulativo).
          example: 1048576
        rxBytes:
          type: integer
          description: Total de bytes recebidos neste VAP (cumulativo).
          example: 2097152
      required: [ssid, band, channel, clients, txBytes, rxBytes]

    UnifiClient:
      type: object
      description: Cliente Wi-Fi associado ao AP UniFi.
      properties:
        id:
          type: string
          description: MAC address ou ID do cliente.
        name:
          type: string
          description: Hostname ou MAC do cliente.
          example: "iPhone-de-João"
        mac:
          type: string
          description: Endereço MAC do cliente.
          example: "aa:bb:cc:dd:ee:ff"
        ip:
          type: string
          nullable: true
          format: ipv4
          example: "192.168.1.100"
        connectedAt:
          type: string
          nullable: true
          format: date-time
        signal:
          type: integer
          nullable: true
          description: |
            Intensidade do sinal em dBm. Disponível apenas via Inform API (unifiAuthMethod=userpass).
            Valores típicos: > -60 bom, -60 a -80 aceitável, < -80 fraco.
          example: -65
        ssid:
          type: string
          nullable: true
          description: SSID ao qual o cliente está conectado. Disponível apenas via Inform API.
          example: "HomeNet"
      required: [id, name, mac]

    UnifiResult:
      type: object
      description: Resultado da checagem do AP UniFi — modelo, recursos e clientes conectados.
      properties:
        model:
          type: string
          nullable: true
          description: "Modelo do AP (ex: U6-Lite, UAP-AC-Pro)."
          example: "U6-Lite"
        firmware:
          type: string
          nullable: true
          description: Versão do firmware instalado.
          example: "6.5.62"
        uptime:
          type: integer
          nullable: true
          description: Tempo em segundos desde o último reinício do AP.
          example: 86400
        cpuLoad:
          type: number
          format: float
          nullable: true
          description: Uso de CPU em percentual (0–100).
          example: 12.5
        memoryUsed:
          type: number
          format: float
          nullable: true
          description: Uso de memória em percentual (0–100).
          example: 48.3
        uplinkTxBps:
          type: integer
          nullable: true
          description: |
            Taxa de transmissão do uplink em bits/segundo.
            Via Integration API: valor instantâneo; via Inform API: delta de dois samples com 1 segundo de intervalo.
          example: 8000000
        uplinkRxBps:
          type: integer
          nullable: true
          description: Taxa de recepção do uplink em bits/segundo.
          example: 24000000
        totalClients:
          type: integer
          description: Total de clientes associados a este AP.
          example: 7
        ssids:
          type: array
          description: |
            Redes Wi-Fi ativas no AP.
            Via Inform API (userpass): inclui canal, clientes por SSID e tráfego acumulado.
            Via Integration API (apikey): apenas nome e bandas dos broadcasts configurados.
          items:
            $ref: "#/components/schemas/UnifiSSID"
        clients:
          type: array
          description: |
            Lista de clientes associados ao AP.
            Campos signal e ssid são nulos quando autenticado via Integration API (apikey).
          items:
            $ref: "#/components/schemas/UnifiClient"
      required: [totalClients, ssids, clients]

    OmadaSSID:
      type: object
      description: Rede Wi-Fi ativa em um AP Omada, derivada dos clientes conectados.
      properties:
        ssid:
          type: string
          example: "Grupo Immuno"
        band:
          type: string
          description: Banda(s) de rádio em uso. Multi-banda separado por " / ".
          example: "2.4 GHz / 5 GHz"
        channel:
          type: string
          nullable: true
          description: Canal(is) em uso. Multi-banda separado por " / " (ex. "6 / 149"). Null se sem dados.
          example: "6 / 149"
        clients:
          type: integer
          description: Clientes conectados neste SSID.
          example: 5
      required: [ssid, band, clients]

    OmadaClient:
      type: object
      description: Cliente Wi-Fi conectado a um AP Omada.
      properties:
        id:
          type: string
          description: MAC address do cliente (usado como ID único).
        name:
          type: string
          description: Hostname do cliente ou MAC se hostname não estiver disponível.
          example: "iPhone-de-João"
        mac:
          type: string
          example: "98:e5:5b:95:b3:0c"
        ip:
          type: string
          nullable: true
          format: ipv4
          example: "10.0.0.60"
        signal:
          type: integer
          nullable: true
          description: Intensidade do sinal em dBm. > -60 bom, -60 a -80 aceitável, < -80 fraco.
          example: -46
        snr:
          type: integer
          nullable: true
          description: Signal-to-Noise Ratio em dB.
          example: 49
        ssid:
          type: string
          nullable: true
          example: "Grupo Immuno"
        band:
          type: string
          nullable: true
          description: Banda de rádio do cliente (2.4 GHz, 5 GHz, 6 GHz).
          example: "5 GHz"
        wifiMode:
          type: integer
          nullable: true
          description: |
            Geração Wi-Fi do cliente.
            - 4 = Wi-Fi 4 (802.11n)
            - 5 = Wi-Fi 5 (802.11ac)
            - 6 = Wi-Fi 6 (802.11ax)
          example: 5
        uptime:
          type: integer
          nullable: true
          description: Tempo em segundos que o cliente está conectado a este AP.
          example: 3600
      required: [id, name, mac]

    OmadaResult:
      type: object
      description: Resultado da checagem do AP Omada via Northbound API — modelo, recursos e clientes conectados.
      properties:
        model:
          type: string
          nullable: true
          description: "Modelo do AP (ex: EAP670, EAP225)."
          example: "EAP225"
        firmware:
          type: string
          nullable: true
          description: Versão do firmware instalado.
          example: "5.2.2 Build 20250709"
        uptime:
          type: integer
          nullable: true
          description: Tempo em segundos desde o último reinício do AP.
          example: 86400
        cpuLoad:
          type: number
          format: float
          nullable: true
          description: Uso de CPU em percentual (0–100).
          example: 3.0
        memoryUsed:
          type: number
          format: float
          nullable: true
          description: Uso de memória em percentual (0–100).
          example: 58.0
        uplinkTxBps:
          type: integer
          nullable: true
          description: |
            Taxa de uplink (AP → controller) em bits/segundo.
            Derivada da soma de `txRate` dos clientes conectados.
          example: 1000000
        uplinkRxBps:
          type: integer
          nullable: true
          description: |
            Taxa de downlink (AP → clientes) em bits/segundo.
            Derivada da soma de `rxRate` dos clientes conectados.
          example: 2000000
        totalClients:
          type: integer
          description: Total de clientes associados a este AP.
          example: 8
        ssids:
          type: array
          description: Redes Wi-Fi ativas, derivadas dos clientes conectados (não da config estática do controller).
          items:
            $ref: "#/components/schemas/OmadaSSID"
        clients:
          type: array
          description: Lista de clientes associados ao AP.
          items:
            $ref: "#/components/schemas/OmadaClient"
      required: [totalClients, ssids, clients]

    StatusHistoryEntry:
      type: object
      description: Registro histórico de um ciclo de checagem de um dispositivo.
      properties:
        id:
          type: string
        deviceId:
          type: string
        isOnline:
          type: boolean
        pingMs:
          type: integer
          nullable: true
        cpuLoad:
          type: number
          format: float
          nullable: true
        memoryUsed:
          type: number
          format: float
          nullable: true
        timestamp:
          type: string
          format: date-time
      required: [id, deviceId, isOnline, timestamp]

    Link:
      type: object
      description: Link WAN com configuração de RouterOS e banda contratada.
      properties:
        id:
          type: string
          example: "clxyz987654321"
        name:
          type: string
          example: "Link Fibra - Matriz"
        description:
          type: string
          nullable: true
          example: "Fibra 500Mbps - Operadora X"
        location:
          type: string
          nullable: true
          example: "Sala de TI - Rack 1"
        isOnline:
          type: boolean
          description: Estado atual do link (atualizado por webhook ou worker).
        lastEventAt:
          type: string
          format: date-time
          nullable: true
          description: Timestamp do último evento UP/DOWN.
        mikrotikDeviceId:
          type: string
          nullable: true
          description: ID do dispositivo Mikrotik responsável por monitorar este link.
        mikrotikInterface:
          type: string
          nullable: true
          example: "ether1"
          description: "Nome exato da interface no RouterOS (ex: ether1, sfp-sfpplus1, bridge)."
        contractedDownloadBps:
          type: integer
          nullable: true
          description: Banda de download contratada em bits/segundo.
          example: 500000000
        contractedUploadBps:
          type: integer
          nullable: true
          description: Banda de upload contratada em bits/segundo.
          example: 100000000
        downloadBps:
          type: integer
          nullable: true
          description: Tráfego de download atual em bits/segundo (atualizado pelo worker).
          example: 127500000
        uploadBps:
          type: integer
          nullable: true
          description: Tráfego de upload atual em bits/segundo (atualizado pelo worker).
          example: 8300000
        latencyMs:
          type: integer
          nullable: true
          description: Latência atual do link em milissegundos (atualizado pelo worker).
          example: 4
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, name, isOnline, createdAt, updatedAt]

    LinkEvent:
      type: object
      description: Evento UP ou DOWN registrado para um link.
      properties:
        id:
          type: string
        linkId:
          type: string
        type:
          $ref: "#/components/schemas/LinkEventType"
        timestamp:
          type: string
          format: date-time
      required: [id, linkId, type, timestamp]

    Note:
      type: object
      description: Nota de segurança ou issue operacional, opcionalmente associada a um dispositivo.
      properties:
        id:
          type: string
        title:
          type: string
          maxLength: 200
          example: "Senha padrão no roteador de filial"
        content:
          type: string
          example: "O Mikrotik da filial Norte ainda usa a senha padrão admin/admin. Trocar imediatamente."
        severity:
          $ref: "#/components/schemas/NoteSeverity"
        category:
          $ref: "#/components/schemas/NoteCategory"
        status:
          $ref: "#/components/schemas/NoteStatus"
        deviceId:
          type: string
          nullable: true
          description: ID do dispositivo relacionado à nota.
        device:
          type: object
          nullable: true
          description: Dados resumidos do dispositivo associado.
          properties:
            id:
              type: string
            name:
              type: string
            ip:
              type: string
        resolvedAt:
          type: string
          format: date-time
          nullable: true
          description: Preenchido automaticamente quando status muda para RESOLVED.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, title, content, severity, category, status, createdAt, updatedAt]

    Incident:
      type: object
      description: Período de indisponibilidade de um dispositivo, derivado do StatusHistory.
      properties:
        id:
          type: string
          description: ID composto de `{deviceId}-{startAt timestamp}`.
        deviceId:
          type: string
        deviceName:
          type: string
        deviceType:
          $ref: "#/components/schemas/DeviceType"
        startAt:
          type: string
          format: date-time
          description: Início do incidente (quando o device ficou offline).
        endAt:
          type: string
          format: date-time
          nullable: true
          description: Fim do incidente. `null` se ainda estiver aberto.
        durationMs:
          type: integer
          nullable: true
          description: Duração em milissegundos. Para incidentes abertos, é calculado até o momento atual.
        resolved:
          type: boolean
          description: "`true` se o device voltou a ficar online dentro do período consultado."
      required: [id, deviceId, deviceName, deviceType, startAt, resolved]

    TimelineEvent:
      type: object
      description: Evento na linha do tempo unificada de dispositivos e links.
      properties:
        id:
          type: string
          description: ID único do evento (composto para eventos de device, ID do LinkEvent para links).
        kind:
          $ref: "#/components/schemas/TimelineEventKind"
        entityId:
          type: string
          description: ID do dispositivo ou link que gerou o evento.
        entityName:
          type: string
          description: Nome do dispositivo ou link.
        entityType:
          oneOf:
            - $ref: "#/components/schemas/DeviceType"
            - type: string
              enum: [LINK]
          description: Tipo da entidade — um dos tipos de device ou `LINK`.
        location:
          type: string
          nullable: true
        timestamp:
          type: string
          format: date-time
        value:
          type: number
          description: |
            Valor numérico opcional. Para `DEVICE_HIGH_LATENCY`, contém o pingMs no momento do evento.
      required: [id, kind, entityId, entityName, entityType, timestamp]

    HealthData:
      type: object
      description: Resumo de saúde do sistema nas últimas 24 horas.
      properties:
        totalChecks:
          type: integer
          description: Total de checagens realizadas.
          example: 1440
        onlineChecks:
          type: integer
          description: Número de checagens em que o device estava online.
          example: 1425
        uptimePct:
          type: number
          format: float
          description: Percentual de uptime (0-100).
          example: 98.96
      required: [totalChecks, onlineChecks, uptimePct]

    OverviewData:
      type: object
      description: Dados para o overview dashboard — sparklines de devices e segmentos de links.
      properties:
        sparklines:
          type: object
          description: |
            Mapa de `deviceId → array de pingMs` (últimas 60 leituras das últimas 6 horas).
            Valores `null` indicam que o device estava offline no momento da leitura.
          additionalProperties:
            type: array
            items:
              type: integer
              nullable: true
          example:
            "clxyz123": [3, 4, null, null, 5, 3]
        linkSegments:
          type: object
          description: |
            Mapa de `linkId → array de 24 SegmentState` (um por hora, da mais antiga para a mais recente).
          additionalProperties:
            type: array
            items:
              $ref: "#/components/schemas/SegmentState"
            minItems: 24
            maxItems: 24
          example:
            "clxyz987": ["online", "online", "degraded", "offline", "online"]
      required: [sparklines, linkSegments]

    # ── Payloads de criação/edição ─────────────────────────────────────────
    DeviceInput:
      type: object
      description: Campos para criar ou atualizar um dispositivo. Todos os campos são opcionais no PUT (PATCH semântico).
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
          example: "Mikrotik Filial Norte"
        ip:
          type: string
          format: ipv4
          example: "10.0.1.1"
          description: Endereço IPv4 do dispositivo (formato `x.x.x.x`).
        type:
          $ref: "#/components/schemas/DeviceType"
        location:
          type: string
          maxLength: 200
          example: "Rack Filial Norte"
        notes:
          type: string
          maxLength: 1000
        pingEnabled:
          type: boolean
          default: true
        httpEnabled:
          type: boolean
          default: false
        httpPort:
          type: integer
          minimum: 1
          maximum: 65535
          nullable: true
        httpPath:
          type: string
          default: "/"
        snmpEnabled:
          type: boolean
          default: false
        snmpCommunity:
          type: string
          default: "public"
        snmpPort:
          type: integer
          default: 161
        routerosEnabled:
          type: boolean
          default: false
        routerosUser:
          type: string
          nullable: true
          deprecated: true
          description: Deprecated — use credenciais criptografadas. Campo aceito para compatibilidade mas nunca retornado pela API.
        routerosPass:
          type: string
          nullable: true
          deprecated: true
          description: Deprecated — use credenciais criptografadas. Campo aceito para compatibilidade mas nunca retornado pela API.
        routerosPort:
          type: integer
          default: 8728
        checkInterval:
          type: integer
          minimum: 10
          maximum: 3600
          default: 60
        alertWebhookUrl:
          type: string
          format: uri
          nullable: true
          description: URL de webhook para receber alertas de falha (Slack, Teams, HTTP genérico). Disparado após `alertThreshold` falhas consecutivas com cooldown de 1 hora.
          example: "https://hooks.slack.com/services/T00/B00/xxx"
        alertThreshold:
          type: integer
          minimum: 1
          maximum: 100
          default: 3
          description: Número de falhas consecutivas para disparar o alerta.

    BulkDeviceInput:
      type: object
      description: |
        Criação em massa de dispositivos por faixa de IP.
        O nome de cada device será `"{name} {último octeto}"` (ex: "Camera 101" para o IP .101).
        Máximo de 254 dispositivos por operação.
      required: [ipStart, ipEnd, name, type]
      properties:
        ipStart:
          type: string
          format: ipv4
          example: "192.168.2.100"
          description: Primeiro IP da faixa (inclusive).
        ipEnd:
          type: string
          format: ipv4
          example: "192.168.2.150"
          description: Último IP da faixa (inclusive).
        name:
          type: string
          minLength: 1
          maxLength: 100
          example: "Camera"
        type:
          $ref: "#/components/schemas/DeviceType"
        location:
          type: string
          maxLength: 200
        pingEnabled:
          type: boolean
          default: true
        httpEnabled:
          type: boolean
          default: false
        httpPort:
          type: integer
          minimum: 1
          maximum: 65535
          nullable: true
        checkInterval:
          type: integer
          minimum: 10
          maximum: 3600
          default: 60

    LinkInput:
      type: object
      description: Campos para criar ou atualizar um link WAN.
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
          example: "Link Fibra 500M"
        description:
          type: string
          maxLength: 500
          nullable: true
          example: "Fibra dedicada - Operadora XYZ"
        location:
          type: string
          maxLength: 100
          nullable: true
          example: "Sala de TI - Patch Panel 2"
        mikrotikDeviceId:
          type: string
          nullable: true
          description: ID do dispositivo Mikrotik para monitoramento de tráfego.
        mikrotikInterface:
          type: string
          maxLength: 50
          nullable: true
          example: "ether1"
        contractedDownloadBps:
          type: integer
          minimum: 1
          nullable: true
          description: Banda de download contratada em bits/segundo.
          example: 500000000
        contractedUploadBps:
          type: integer
          minimum: 1
          nullable: true
          description: Banda de upload contratada em bits/segundo.
          example: 100000000

    NoteInput:
      type: object
      description: Campos para criar uma nota de segurança/operacional.
      required: [title, content]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
          example: "Firewall sem regras de egress"
        content:
          type: string
          minLength: 1
          example: "O Mikrotik principal não possui regras de saída configuradas, permitindo qualquer tráfego outbound."
        severity:
          $ref: "#/components/schemas/NoteSeverity"
        category:
          $ref: "#/components/schemas/NoteCategory"
        status:
          $ref: "#/components/schemas/NoteStatus"
        deviceId:
          type: string
          nullable: true

    NoteUpdateInput:
      type: object
      description: Campos para atualizar uma nota (todos opcionais). Alterar status para RESOLVED define resolvedAt automaticamente.
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        content:
          type: string
          minLength: 1
        severity:
          $ref: "#/components/schemas/NoteSeverity"
        category:
          $ref: "#/components/schemas/NoteCategory"
        status:
          $ref: "#/components/schemas/NoteStatus"
        deviceId:
          type: string
          nullable: true
        resolvedAt:
          type: string
          format: date-time
          nullable: true

    # ── AuditLog ───────────────────────────────────────────────────────────
    AuditLog:
      type: object
      properties:
        id:
          type: string
          description: ID do registro (CUID).
        action:
          type: string
          enum: [CREATE, UPDATE, DELETE, CLEANUP]
        entity:
          type: string
          example: "Device"
        entityId:
          type: string
          nullable: true
        entityName:
          type: string
          nullable: true
        details:
          type: object
          nullable: true
          additionalProperties: true
        ipAddress:
          type: string
          nullable: true
        userId:
          type: string
          nullable: true
        username:
          type: string
          nullable: true
          example: "admin"
        timestamp:
          type: string
          format: date-time

    # ── User ───────────────────────────────────────────────────────────────
    User:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
          example: "admin"
        role:
          type: string
          enum: [ADMIN, OPERADOR, VIEWER]
        version:
          type: integer
          description: Campo de versão para optimistic locking.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # ── Respostas de erro ──────────────────────────────────────────────────
    ErrorResponse:
      type: object
      properties:
        error:
          oneOf:
            - type: string
              example: "Unauthorized"
            - type: object
              description: Objeto de erros de validação Zod (fieldErrors + formErrors).
      required: [error]

    WebhookResponse:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        status:
          type: string
          enum: [up, down]
          example: "up"
      required: [ok, status]

# ─── Security global (aplicada a todos os endpoints, sobrescrita individualmente) ───
security:
  - sessionCookie: []

# ─── Paths ──────────────────────────────────────────────────────────────────
paths:

  # ── Autenticação ──────────────────────────────────────────────────────────
  /api/auth/callback/credentials:
    post:
      tags: [Autenticação]
      summary: Login com usuário e senha
      description: |
        Endpoint gerenciado pelo NextAuth. Autentica o usuário e retorna um cookie de sessão JWT.

        **Rate limit:** 10 tentativas por IP em 15 minutos. Retorna `429` quando o limite é excedido.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                  example: "admin"
                password:
                  type: string
                  format: password
                  example: "senha-segura-123"
      responses:
        "200":
          description: Login bem-sucedido. O cookie `next-auth.session-token` é definido na resposta.
        "401":
          description: Credenciais inválidas.
        "429":
          description: Muitas tentativas. Aguarde 15 minutos.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Muitas tentativas de login. Aguarde 15 minutos."

  # ── Sistema ───────────────────────────────────────────────────────────────
  /api/health:
    get:
      tags: [Sistema]
      summary: Saúde do sistema (últimas 24h)
      description: |
        Retorna o total de checagens, quantas foram bem-sucedidas e o percentual de uptime
        nas últimas 24 horas. **Este endpoint é público — não exige autenticação.**
      security: []
      responses:
        "200":
          description: Dados de saúde calculados com sucesso.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthData"
              example:
                totalChecks: 1440
                onlineChecks: 1425
                uptimePct: 98.96

  /api/metrics:
    get:
      tags: [Sistema]
      summary: Métricas no formato Prometheus / OpenMetrics
      description: |
        Retorna métricas do sistema em formato texto compatível com Prometheus scrape.
        **Este endpoint é público — não exige autenticação.**

        Métricas expostas:
        - `watchit_devices_total{status}` — contagem de devices por status (online/offline/unknown)
        - `watchit_device_uptime_pct{id,name}` — uptime das últimas 24h por device (0–100)
        - `watchit_device_ping_avg_ms{id,name}` — ping médio das últimas 24h por device
        - `watchit_worker_heartbeat_age_seconds` — segundos desde o último heartbeat do worker
        - `watchit_links_total{status}` — contagem de links por status (online/offline/unknown)
      security: []
      responses:
        "200":
          description: Métricas em formato texto OpenMetrics.
          content:
            text/plain; version=0.0.4; charset=utf-8:
              schema:
                type: string
              example: |
                # HELP watchit_devices_total Total devices by status
                # TYPE watchit_devices_total gauge
                watchit_devices_total{status="online"} 12
                watchit_devices_total{status="offline"} 1
                watchit_devices_total{status="unknown"} 0
                # HELP watchit_worker_heartbeat_age_seconds Seconds since last worker heartbeat
                # TYPE watchit_worker_heartbeat_age_seconds gauge
                watchit_worker_heartbeat_age_seconds 42

  /api/overview:
    get:
      tags: [Sistema]
      summary: Dados do overview dashboard
      description: |
        Retorna dados agregados para o overview:
        - **Sparklines:** últimas 60 leituras de ping por device (janela de 6h)
        - **Segmentos de link:** 24 slots horários de disponibilidade por link (janela de 24h)
      responses:
        "200":
          description: Dados do overview calculados com sucesso.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OverviewData"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/timeline:
    get:
      tags: [Incidentes]
      summary: Linha do tempo unificada de eventos
      description: |
        Retorna eventos de devices (transições OFFLINE/ONLINE/HIGH_LATENCY derivadas do StatusHistory)
        e de links (eventos UP/DOWN do LinkEvent), mesclados e ordenados do mais recente para o mais antigo.

        **Lógica de emissão de eventos de device:**
        - `DEVICE_OFFLINE` — transição de `isOnline=true` para `false`
        - `DEVICE_ONLINE` — transição de `isOnline=false` para `true`
        - `DEVICE_HIGH_LATENCY` — primeira checagem acima de 150ms enquanto o device está online (apenas na borda de subida)
      parameters:
        - in: query
          name: hours
          schema:
            type: integer
            default: 24
            minimum: 1
            maximum: 168
          description: Janela de tempo em horas (máximo 168h = 7 dias). Padrão 24h.
      responses:
        "200":
          description: Lista de eventos ordenados do mais recente para o mais antigo.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TimelineEvent"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/incidents:
    get:
      tags: [Incidentes]
      summary: Histórico de incidentes por dispositivo
      description: |
        Retorna incidentes (períodos de indisponibilidade) derivados do StatusHistory.
        Incidentes sem `endAt` são incidentes abertos (device ainda offline).

        Os incidentes são ordenados do mais recente para o mais antigo.
      parameters:
        - in: query
          name: hours
          schema:
            type: integer
            default: 168
            minimum: 1
            maximum: 720
          description: Janela de tempo em horas (máximo 720h = 30 dias). Padrão 168h (7 dias).
      responses:
        "200":
          description: Lista de incidentes.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Incident"
              example:
                - id: "clxyz123-1717610400000"
                  deviceId: "clxyz123"
                  deviceName: "Mikrotik Filial Norte"
                  deviceType: "MIKROTIK"
                  startAt: "2026-06-05T12:00:00.000Z"
                  endAt: "2026-06-05T12:35:00.000Z"
                  durationMs: 2100000
                  resolved: true
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ── Dispositivos ──────────────────────────────────────────────────────────
  /api/devices:
    get:
      tags: [Dispositivos]
      summary: Listar dispositivos
      description: |
        Retorna todos os dispositivos com o status mais recente (`currentStatus`) incluído.
        Use o parâmetro `type` para filtrar por tipo — útil ao popular dropdowns de Mikrotik em formulários de link.

        **Paginação**: quando `page` ou `limit` são informados, a resposta inclui o header `X-Total-Count` com o total de registros.
        Sem paginação, retorna todos os registros.

        **Cache / ETag**: quando `type` não é usado, a resposta inclui um header `ETag` calculado via `COUNT + MAX(updatedAt)`.
        O cliente pode enviar `If-None-Match` para receber `304 Not Modified` quando os dados não mudaram.
      parameters:
        - in: query
          name: type
          schema:
            $ref: "#/components/schemas/DeviceType"
          description: Filtrar por tipo de dispositivo.
          example: MIKROTIK
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
          description: "Número da página (base 1). Requer `limit`."
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
          description: Registros por página. Ativa a paginação e o header `X-Total-Count`.
      responses:
        "200":
          description: Lista de dispositivos ordenada por nome.
          headers:
            ETag:
              description: Fingerprint do conjunto de dados para cache condicional (presente quando `type` não é usado).
              schema:
                type: string
              example: '"a1b2c3d4e5f6"'
            X-Total-Count:
              description: Total de registros (presente quando `page` ou `limit` são usados).
              schema:
                type: integer
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Device"
        "400":
          description: Tipo de dispositivo inválido.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Tipo de dispositivo inválido"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      tags: [Dispositivos]
      summary: Criar dispositivo
      description: Cria um novo dispositivo monitorado. O worker começará a monitorá-lo no próximo ciclo.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeviceInput"
            example:
              name: "Mikrotik Matriz"
              ip: "192.168.1.1"
              type: "MIKROTIK"
              location: "Sala de TI"
              pingEnabled: true
              routerosEnabled: true
              routerosUser: "admin"
              routerosPass: "senha123"
              checkInterval: 30
      responses:
        "201":
          description: Dispositivo criado com sucesso.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Device"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/devices/bulk:
    post:
      tags: [Dispositivos]
      summary: Criar dispositivos em massa (por faixa de IP)
      description: |
        Cria múltiplos dispositivos de uma vez especificando uma faixa de IP (`ipStart` a `ipEnd`).
        O nome de cada dispositivo será `"{name} {último octeto do IP}"` — ex: nome `"Camera"` + IP `192.168.2.101` = `"Camera 101"`.

        IPs já existentes são ignorados (`skipDuplicates: true`).
        Limite de 254 dispositivos por operação.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkDeviceInput"
            example:
              ipStart: "192.168.2.100"
              ipEnd: "192.168.2.120"
              name: "Camera"
              type: "CAMERA"
              location: "Estacionamento"
              pingEnabled: true
              checkInterval: 60
      responses:
        "201":
          description: Criação concluída. Retorna contagem e lista de IPs criados.
          content:
            application/json:
              schema:
                type: object
                properties:
                  created:
                    type: integer
                    description: Número de dispositivos efetivamente criados (IPs duplicados não contam).
                    example: 21
                  ips:
                    type: array
                    items:
                      type: string
                    description: Lista de IPs criados.
                    example: ["192.168.2.100", "192.168.2.101"]
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/devices/{id}:
    parameters:
      - $ref: "#/components/parameters/DeviceId"

    get:
      tags: [Dispositivos]
      summary: Buscar dispositivo por ID
      responses:
        "200":
          description: Dispositivo encontrado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Device"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      tags: [Dispositivos]
      summary: Atualizar dispositivo
      description: Atualiza parcialmente um dispositivo (todos os campos são opcionais — comportamento PATCH).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeviceInput"
      responses:
        "200":
          description: Dispositivo atualizado com sucesso.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Device"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags: [Dispositivos]
      summary: Excluir dispositivo
      description: Remove o dispositivo e todos os seus dados históricos (StatusHistory + DeviceStatus) em cascata.
      responses:
        "204":
          description: Dispositivo excluído com sucesso.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/devices/{id}/export:
    parameters:
      - $ref: "#/components/parameters/DeviceId"
    get:
      tags: [Dispositivos]
      summary: Exportar histórico de status como CSV
      description: |
        Retorna o `StatusHistory` do dispositivo no intervalo especificado como arquivo CSV.
        Campos: `timestamp`, `isOnline`, `pingMs`, `cpuLoad`, `memoryUsed`.
        Máximo de 8760 horas (1 ano). Padrão: 720 horas (30 dias).
      parameters:
        - in: query
          name: hours
          schema:
            type: integer
            minimum: 1
            maximum: 8760
            default: 720
          description: Janela de tempo em horas a partir de agora.
      responses:
        "200":
          description: Arquivo CSV com histórico de status.
          headers:
            Content-Disposition:
              schema:
                type: string
                example: attachment; filename="Router_HQ-2026-06-13.csv"
          content:
            text/csv:
              schema:
                type: string
                example: |
                  timestamp,isOnline,pingMs,cpuLoad,memoryUsed
                  2026-06-13T10:00:00.000Z,true,5,20.5,60.0
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Status / histórico ────────────────────────────────────────────────────
  /api/status/{deviceId}:
    get:
      tags: [Status]
      summary: Histórico de status de um dispositivo
      description: |
        Retorna as entradas do StatusHistory de um dispositivo dentro da janela de tempo especificada,
        ordenadas por timestamp crescente. Limitado a 500 registros.
      parameters:
        - in: path
          name: deviceId
          required: true
          schema:
            type: string
          description: ID do dispositivo.
          example: "clxyz123456789"
        - in: query
          name: hours
          schema:
            type: integer
            default: 24
            minimum: 1
            maximum: 168
          description: Janela de tempo em horas (máximo 168h = 7 dias). Padrão 24h.
      responses:
        "200":
          description: Histórico de status ordenado por timestamp.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StatusHistoryEntry"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ── Links ─────────────────────────────────────────────────────────────────
  /api/links:
    get:
      tags: [Links]
      summary: Listar links WAN
      description: |
        Retorna todos os links ordenados por data de criação (mais recentes primeiro), incluindo contagem de eventos.

        **Paginação**: quando `page` ou `limit` são informados, a resposta inclui o header `X-Total-Count`.
        Sem paginação, retorna todos os registros.
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
          description: "Número da página (base 1). Requer `limit`."
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
          description: Registros por página. Ativa a paginação e o header `X-Total-Count`.
      responses:
        "200":
          description: Lista de links.
          headers:
            X-Total-Count:
              description: Total de registros (presente quando `page` ou `limit` são usados).
              schema:
                type: integer
          content:
            application/json:
              schema:
                type: array
                items:
                  allOf:
                    - $ref: "#/components/schemas/Link"
                    - type: object
                      properties:
                        _count:
                          type: object
                          properties:
                            events:
                              type: integer
                              description: Total de eventos UP/DOWN registrados para este link.
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      tags: [Links]
      summary: Criar link WAN
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LinkInput"
            example:
              name: "Link Fibra 500M - Matriz"
              location: "Sala de TI - Rack 1"
              mikrotikDeviceId: "clxyz123456789"
              mikrotikInterface: "ether1"
              contractedDownloadBps: 500000000
              contractedUploadBps: 100000000
      responses:
        "201":
          description: Link criado com sucesso.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Link"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/links/{id}:
    parameters:
      - $ref: "#/components/parameters/LinkId"

    get:
      tags: [Links]
      summary: Buscar link por ID
      responses:
        "200":
          description: Link encontrado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Link"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      tags: [Links]
      summary: Atualizar link
      description: Atualiza parcialmente um link (todos os campos são opcionais).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LinkInput"
      responses:
        "200":
          description: Link atualizado com sucesso.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Link"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags: [Links]
      summary: Excluir link
      description: Remove o link e todos os seus eventos (LinkEvent) em cascata.
      responses:
        "204":
          description: Link excluído com sucesso.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/links/{id}/events:
    get:
      tags: [Links]
      summary: Histórico de eventos UP/DOWN de um link
      description: |
        Retorna o histórico de eventos UP/DOWN do link na janela de tempo especificada,
        além do estado inicial do link antes da janela (`lastBefore`) para permitir
        reconstruir o estado correto nos gráficos.
      parameters:
        - $ref: "#/components/parameters/LinkId"
        - in: query
          name: hours
          schema:
            type: integer
            default: 24
            minimum: 1
            maximum: 720
          description: Janela de tempo em horas (máximo 720h = 30 dias). Padrão 24h.
      responses:
        "200":
          description: Dados do link com histórico de eventos.
          content:
            application/json:
              schema:
                type: object
                properties:
                  link:
                    $ref: "#/components/schemas/Link"
                  events:
                    type: array
                    items:
                      $ref: "#/components/schemas/LinkEvent"
                    description: Eventos dentro da janela, ordenados por timestamp.
                  lastBefore:
                    allOf:
                      - $ref: "#/components/schemas/LinkEvent"
                    nullable: true
                    description: Último evento antes da janela de tempo. Útil para determinar o estado inicial do gráfico.
                  since:
                    type: string
                    format: date-time
                    description: Timestamp de início da janela consultada.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/links/{id}/up:
    parameters:
      - $ref: "#/components/parameters/LinkId"
    post:
      tags: [Links]
      summary: Webhook — marcar link como UP
      description: |
        Registra um evento UP e atualiza `isOnline = true` do link.
        Se o link já estiver online, a chamada é idempotente (retorna `ok: true` sem criar evento duplicado).

        **Autenticação:** token HMAC-SHA256 via header `x-webhook-token` ou query string `?token=`.
        O token é gerado com `HMAC-SHA256(WEBHOOK_SECRET, linkId)`.

        Aceita tanto `POST` quanto `GET` para compatibilidade com scripts e ferramentas de monitoramento externas.
      security:
        - webhookToken: []
      parameters:
        - in: query
          name: token
          schema:
            type: string
          description: Token de autenticação (alternativa ao header `x-webhook-token`).
      responses:
        "200":
          description: Link marcado como UP.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookResponse"
              example:
                ok: true
                status: "up"
        "401":
          description: Token inválido ou ausente.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    get:
      tags: [Links]
      summary: Webhook — marcar link como UP (GET)
      description: Mesmo comportamento do `POST`. Suportado para compatibilidade com ferramentas que só fazem GET.
      security:
        - webhookToken: []
      parameters:
        - in: query
          name: token
          schema:
            type: string
      responses:
        "200":
          description: Link marcado como UP.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookResponse"
        "401":
          description: Token inválido ou ausente.
        "404":
          $ref: "#/components/responses/NotFound"

  /api/links/{id}/down:
    parameters:
      - $ref: "#/components/parameters/LinkId"
    post:
      tags: [Links]
      summary: Webhook — marcar link como DOWN
      description: |
        Registra um evento DOWN e atualiza `isOnline = false` do link.
        Se o link já estiver offline, a chamada é idempotente.

        Mesma autenticação do endpoint `/up`.
      security:
        - webhookToken: []
      parameters:
        - in: query
          name: token
          schema:
            type: string
      responses:
        "200":
          description: Link marcado como DOWN.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookResponse"
              example:
                ok: true
                status: "down"
        "401":
          description: Token inválido ou ausente.
        "404":
          $ref: "#/components/responses/NotFound"
    get:
      tags: [Links]
      summary: Webhook — marcar link como DOWN (GET)
      description: Mesmo comportamento do `POST`. Suportado para compatibilidade.
      security:
        - webhookToken: []
      parameters:
        - in: query
          name: token
          schema:
            type: string
      responses:
        "200":
          description: Link marcado como DOWN.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookResponse"
        "401":
          description: Token inválido ou ausente.
        "404":
          $ref: "#/components/responses/NotFound"

  /api/devices/test-omada:
    post:
      tags: [Dispositivos]
      summary: Testar conexão Omada e listar sites
      description: |
        Valida as credenciais OAuth2 da Northbound API do Omada Controller e retorna a lista de
        sites disponíveis. Use antes de salvar um OMADA_AP para confirmar o `omadacId` e selecionar
        o `omadaSiteId` correto.

        **Resolução de credenciais:**
        - Se `omadaClientId` e `omadaClientSecret` forem enviados, são usados diretamente.
        - Se omitidos mas `deviceId` for fornecido, as credenciais são lidas do banco (descriptografadas).
        - Se nenhuma credencial estiver disponível, retorna 422.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [controllerIp, omadacId, tlsVerify]
              properties:
                controllerIp:
                  type: string
                  format: ipv4
                  description: IP do Omada Controller.
                  example: "10.0.0.19"
                omadacId:
                  type: string
                  description: omadacId do controller (visível na URL do painel Omada).
                  example: "abc123def456"
                tlsVerify:
                  type: boolean
                  description: Se deve validar o certificado TLS (false para certificados autoassinados).
                  example: false
                omadaClientId:
                  type: string
                  description: OAuth2 client_id (opcional se deviceId for fornecido).
                omadaClientSecret:
                  type: string
                  description: OAuth2 client_secret (opcional se deviceId for fornecido).
                deviceId:
                  type: string
                  description: ID de um OMADA_AP existente para reutilizar as credenciais armazenadas.
      responses:
        "200":
          description: Autenticação bem-sucedida. Retorna lista de sites.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  sites:
                    type: array
                    items:
                      type: object
                      properties:
                        siteId:
                          type: string
                          example: "site-abc123"
                        name:
                          type: string
                          example: "Sede"
                  message:
                    type: string
                    example: "Autenticado. 2 site(s) disponível(is)."
        "400":
          description: Parâmetros inválidos.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          description: |
            Credenciais ausentes ou falha na conexão/autenticação com o controller.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                sem_credenciais:
                  summary: Credenciais não fornecidas
                  value:
                    error: "Informe client_id e client_secret para testar a conexão"
                auth_falhou:
                  summary: client_id ou client_secret inválidos
                  value:
                    error: "client_id ou client_secret inválidos"
                conexao_falhou:
                  summary: Controller inacessível
                  value:
                    error: "Timeout ao conectar a 10.0.0.19"

  /api/links/test-traffic:
    post:
      tags: [Links]
      summary: Testar conexão RouterOS e medir tráfego
      description: |
        Valida a conexão RouterOS de um dispositivo Mikrotik e retorna uma amostra de tráfego
        da interface especificada. Use antes de salvar um link para garantir que as configurações estão corretas.

        O teste executa dois samples de `/interface/print` com 1 segundo de intervalo
        e calcula `(Δbytes × 8)` para obter bits/segundo.

        **Erros mapeados para mensagens amigáveis:**
        - Falha de conexão TCP → sugere verificar IP, porta e se a API RouterOS está habilitada
        - Falha de autenticação → sugere verificar credenciais
        - Interface não encontrada → sugere verificar o nome exato (ether1, sfp-sfpplus1, bridge, etc.)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mikrotikDeviceId, mikrotikInterface]
              properties:
                mikrotikDeviceId:
                  type: string
                  description: ID do dispositivo Mikrotik (deve ter `routerosEnabled = true` e credenciais configuradas).
                  example: "clxyz123456789"
                mikrotikInterface:
                  type: string
                  description: Nome exato da interface no RouterOS.
                  example: "ether1"
      responses:
        "200":
          description: Conexão bem-sucedida. Retorna tráfego medido.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  downloadBps:
                    type: integer
                    description: Download em bits/segundo.
                    example: 4500000
                  uploadBps:
                    type: integer
                    description: Upload em bits/segundo.
                    example: 800000
        "400":
          description: Parâmetros inválidos.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Dispositivo Mikrotik não encontrado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: |
            Falha na conexão ou configuração do RouterOS.
            A mensagem de erro é amigável e descreve a causa provável.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                sem_routeros:
                  summary: RouterOS não habilitado no device
                  value:
                    error: 'Dispositivo "Mikrotik Matriz" não tem RouterOS API habilitado ou credenciais configuradas'
                conexao_falhou:
                  summary: Falha de conexão TCP
                  value:
                    error: "Não foi possível conectar ao Mikrotik 192.168.1.1:8728 — verifique IP, porta e se a API RouterOS está habilitada"
                interface_invalida:
                  summary: Interface não encontrada
                  value:
                    error: 'Interface "eth0" não encontrada em Mikrotik Matriz — verifique o nome exato (ex: ether1, sfp-sfpplus1, bridge)'

  # ── Relatórios ───────────────────────────────────────────────────────────
  /api/reports:
    get:
      tags: [Status]
      summary: Relatório de disponibilidade por dispositivo
      description: |
        Retorna um relatório detalhado para um ou mais dispositivos com:
        - **Resumo:** uptime%, total de checks, contagem de incidentes, downtime total, ping médio/min/max
        - **Insights:** alertas automáticos (uptime crítico, ping elevado, etc.)
        - **Histórico de ping:** série temporal de `isOnline` e `pingMs`
        - **Histórico RouterOS:** série temporal de CPU e memória (apenas para MIKROTIK com RouterOS habilitado)
        - **Incidentes:** períodos de indisponibilidade com duração

        Máximo de 10 dispositivos por requisição.
      parameters:
        - in: query
          name: devices
          required: true
          schema:
            type: string
          description: IDs dos dispositivos separados por vírgula.
          example: "clxyz123,clxyz456"
        - in: query
          name: hours
          schema:
            type: integer
            default: 168
            minimum: 1
            maximum: 720
          description: Janela de tempo em horas (máximo 720h = 30 dias). Padrão 168h (7 dias).
      responses:
        "200":
          description: Relatórios gerados com sucesso (um por dispositivo).
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    device:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        type:
                          $ref: "#/components/schemas/DeviceType"
                        ip:
                          type: string
                        location:
                          type: string
                          nullable: true
                    period:
                      type: object
                      properties:
                        from:
                          type: string
                          format: date-time
                        to:
                          type: string
                          format: date-time
                        hours:
                          type: integer
                    summary:
                      type: object
                      properties:
                        uptimePct:
                          type: number
                          format: float
                          description: Percentual de uptime (0–100).
                          example: 99.31
                        totalChecks:
                          type: integer
                          example: 10080
                        onlineChecks:
                          type: integer
                          example: 10010
                        incidentCount:
                          type: integer
                          example: 2
                        totalDowntimeMs:
                          type: integer
                          description: Tempo total offline em milissegundos.
                          example: 4200000
                        avgPingMs:
                          type: number
                          nullable: true
                          example: 3.2
                        maxPingMs:
                          type: number
                          nullable: true
                          example: 210
                        minPingMs:
                          type: number
                          nullable: true
                          example: 1
                    insights:
                      type: array
                      items:
                        type: object
                        properties:
                          level:
                            type: string
                            enum: [ok, warn, critical]
                          text:
                            type: string
                            example: "Uptime crítico: 72.3% nas últimas 168h"
                    pingHistory:
                      type: array
                      items:
                        type: object
                        properties:
                          timestamp:
                            type: string
                            format: date-time
                          pingMs:
                            type: integer
                            nullable: true
                          isOnline:
                            type: boolean
                    routerosHistory:
                      type: array
                      nullable: true
                      items:
                        type: object
                        properties:
                          timestamp:
                            type: string
                            format: date-time
                          cpuLoad:
                            type: number
                            nullable: true
                          memoryUsed:
                            type: number
                            nullable: true
                    incidents:
                      type: array
                      items:
                        type: object
                        properties:
                          startAt:
                            type: string
                            format: date-time
                          endAt:
                            type: string
                            format: date-time
                            nullable: true
                          durationMs:
                            type: integer
                            nullable: true
                          resolved:
                            type: boolean
        "400":
          description: Parâmetros inválidos (nenhum dispositivo informado ou limite de 10 excedido).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ── Live traffic ──────────────────────────────────────────────────────────
  /api/links/{id}/live-traffic:
    parameters:
      - $ref: "#/components/parameters/LinkId"
    get:
      tags: [Links]
      summary: Medir tráfego ao vivo de um link
      description: |
        Executa uma medição de tráfego em tempo real na interface RouterOS configurada no link.
        Conecta ao Mikrotik, lê `rx-byte`/`tx-byte` de `/interface/print` duas vezes com 1 segundo
        de intervalo e calcula `(Δbytes × 8)` para obter bits/segundo.

        **Atenção:** este endpoint faz uma conexão real ao Mikrotik e leva ~1,5s para responder.
      responses:
        "200":
          description: Medição concluída com sucesso.
          content:
            application/json:
              schema:
                type: object
                properties:
                  downloadBps:
                    type: integer
                    description: Download em bits/segundo.
                    example: 127500000
                  uploadBps:
                    type: integer
                    description: Upload em bits/segundo.
                    example: 8300000
                  timestamp:
                    type: string
                    format: date-time
                    description: Momento da medição.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          description: Link sem Mikrotik configurado, sem credenciais ou falha na conexão.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                sem_mikrotik:
                  summary: Interface não configurada
                  value:
                    error: "Este link não tem Mikrotik ou interface configurados"
                sem_credenciais:
                  summary: Sem credenciais RouterOS
                  value:
                    error: "Dispositivo \"Mikrotik Matriz\" não tem credenciais RouterOS configuradas"
                conexao_falhou:
                  summary: Falha na conexão
                  value:
                    error: "Falha ao medir tráfego: connect ECONNREFUSED 192.168.1.1:8728"

  /api/devices/test-unifi:
    post:
      tags: [Dispositivos]
      summary: Testar conexão UniFi e listar sites
      description: |
        Valida as credenciais do UniFi Controller e retorna informações básicas do AP.
        Suporta dois métodos de autenticação:
        - **apikey** — Integration API via `X-API-KEY` (recomendado; disponível no UniFi Network 8+)
        - **userpass** — Inform API via usuário/senha (acesso a RSSI, SSID e canal por cliente)

        **Resolução de credenciais:**
        - Se as credenciais forem enviadas no body, são usadas diretamente.
        - Se `deviceId` for fornecido sem credenciais, as credenciais armazenadas são descriptografadas do banco.
        - Requer perfil OPERADOR ou superior.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [controllerIp, port, site, tlsVerify, authMethod]
              properties:
                controllerIp:
                  type: string
                  format: ipv4
                  description: IP do UniFi Controller.
                  example: "192.168.1.200"
                port:
                  type: integer
                  minimum: 1
                  maximum: 65535
                  default: 443
                  description: Porta HTTPS do controller.
                site:
                  type: string
                  description: Nome ou ID do site no controller.
                  default: "default"
                  example: "default"
                tlsVerify:
                  type: boolean
                  description: Se deve validar o certificado TLS (false para certificados autoassinados).
                  example: false
                authMethod:
                  type: string
                  enum: [apikey, userpass]
                  default: "apikey"
                  description: Método de autenticação.
                apiKey:
                  type: string
                  description: Chave de API (necessária se authMethod=apikey sem deviceId).
                unifiUser:
                  type: string
                  description: Usuário (necessário se authMethod=userpass sem deviceId).
                unifiPass:
                  type: string
                  description: Senha (necessária se authMethod=userpass sem deviceId).
                deviceId:
                  type: string
                  description: ID de um UNIFI_AP existente para reutilizar credenciais armazenadas.
      responses:
        "200":
          description: Autenticação bem-sucedida. Retorna lista de sites disponíveis.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  sites:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          description: ID do site.
                          example: "default"
                        name:
                          type: string
                          description: Nome do site.
                          example: "Default"
                  message:
                    type: string
                    example: "Autenticado via Integration API. 1 site(s) disponível(is)."
        "400":
          description: Parâmetros inválidos.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Perfil insuficiente — requer OPERADOR ou superior.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Credenciais ausentes ou falha na conexão com o controller.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                sem_credenciais:
                  summary: Credenciais não fornecidas
                  value:
                    error: "Informe apiKey ou unifiUser/unifiPass para testar a conexão"
                auth_falhou:
                  summary: Credenciais inválidas
                  value:
                    error: "Autenticação falhou — verifique as credenciais"

  # ── Admin — Auditoria ─────────────────────────────────────────────────────
  /api/admin/audit:
    get:
      tags: [Admin]
      summary: Listar logs de auditoria
      description: |
        Retorna os últimos registros de auditoria (CREATE/UPDATE/DELETE/CLEANUP), 50 por página.
        Requer papel **ADMIN**.
      parameters:
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
        - in: query
          name: action
          schema: { type: string, enum: [CREATE, UPDATE, DELETE, CLEANUP] }
        - in: query
          name: entity
          schema: { type: string }
          example: Device
        - in: query
          name: from
          schema: { type: string, format: date-time }
        - in: query
          name: to
          schema: { type: string, format: date-time }
      responses:
        "200":
          description: Página de logs de auditoria.
          content:
            application/json:
              schema:
                type: object
                properties:
                  logs:
                    type: array
                    items:
                      $ref: "#/components/schemas/AuditLog"
                  pagination:
                    type: object
                    properties:
                      page: { type: integer }
                      pageSize: { type: integer }
                      total: { type: integer }
                      totalPages: { type: integer }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { description: "Acesso negado — papel ADMIN necessário." }

  /api/admin/audit/stats:
    get:
      tags: [Admin]
      summary: Estatísticas de auditoria
      description: Contagem de eventos por ação nas últimas 24h e totais históricos. Requer papel **ADMIN**.
      responses:
        "200":
          description: Estatísticas de auditoria.
          content:
            application/json:
              schema:
                type: object
                properties:
                  last24h:
                    type: object
                    additionalProperties: { type: integer }
                  total: { type: integer }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { description: "Acesso negado — papel ADMIN necessário." }

  /api/admin/audit/export:
    get:
      tags: [Admin]
      summary: Exportar logs de auditoria como CSV
      description: Retorna todos os logs de auditoria em formato CSV para download. Requer papel **ADMIN**.
      responses:
        "200":
          description: Arquivo CSV com os logs.
          content:
            text/csv:
              schema:
                type: string
                format: binary
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { description: "Acesso negado — papel ADMIN necessário." }

  /api/admin/audit/purge:
    post:
      tags: [Admin]
      summary: Purgar logs de auditoria antigos
      description: Remove logs de auditoria anteriores à janela de retenção configurada. Requer papel **ADMIN**.
      responses:
        "200":
          description: Contagem de registros removidos.
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted: { type: integer }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { description: "Acesso negado — papel ADMIN necessário." }

  # ── Admin — Cleanup ────────────────────────────────────────────────────────
  /api/admin/cleanup:
    post:
      tags: [Admin]
      summary: Limpeza manual de logs de status e eventos
      description: |
        Remove registros de `StatusHistory` e `LinkEvent` mais antigos que a janela de retenção
        configurada em `/api/admin/config`. Requer papel **ADMIN**.
      responses:
        "200":
          description: Contagem de registros removidos.
          content:
            application/json:
              schema:
                type: object
                properties:
                  deletedStatusHistory: { type: integer }
                  deletedLinkEvents: { type: integer }
                  cutoffs:
                    type: object
                    properties:
                      statusHistory: { type: string, format: date-time }
                      linkEvents: { type: string, format: date-time }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { description: "Acesso negado — papel ADMIN necessário." }

  # ── Admin — Configuração ───────────────────────────────────────────────────
  /api/admin/config:
    get:
      tags: [Admin]
      summary: Obter configuração do sistema
      description: Retorna as configurações de retenção de dados. Requer papel **ADMIN**.
      responses:
        "200":
          description: Configuração atual.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: integer }
                  statusHistoryDays: { type: integer, example: 30 }
                  linkEventDays: { type: integer, example: 90 }
                  lastCleanupAt: { type: string, format: date-time, nullable: true }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { description: "Acesso negado — papel ADMIN necessário." }

    put:
      tags: [Admin]
      summary: Atualizar configuração do sistema
      description: Atualiza os dias de retenção de StatusHistory e/ou LinkEvent. Requer papel **ADMIN**.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                statusHistoryDays:
                  type: integer
                  minimum: 1
                  maximum: 365
                linkEventDays:
                  type: integer
                  minimum: 1
                  maximum: 365
            example:
              statusHistoryDays: 60
              linkEventDays: 180
      responses:
        "200":
          description: Configuração atualizada.
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { description: "Acesso negado — papel ADMIN necessário." }

  # ── Admin — Stats ──────────────────────────────────────────────────────────
  /api/admin/stats:
    get:
      tags: [Admin]
      summary: Estatísticas do banco e do worker
      description: Retorna tamanho do banco, contagem de registros por tabela e status do worker. Requer papel **ADMIN**.
      responses:
        "200":
          description: Estatísticas do sistema.
          content:
            application/json:
              schema:
                type: object
                properties:
                  database:
                    type: object
                    properties:
                      size: { type: string, example: "42 MB" }
                      sizeBytes: { type: integer }
                  counts:
                    type: object
                    additionalProperties: { type: integer }
                  tables:
                    type: array
                    items:
                      type: object
                      properties:
                        name: { type: string }
                        rowEstimate: { type: integer }
                        totalSize: { type: string }
                        totalBytes: { type: integer }
                  worker:
                    type: object
                    properties:
                      isAlive: { type: boolean }
                      lastSeenAt: { type: string, format: date-time, nullable: true }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { description: "Acesso negado — papel ADMIN necessário." }

  # ── Usuários ───────────────────────────────────────────────────────────────
  /api/users:
    get:
      tags: [Usuários]
      summary: Listar usuários
      description: Retorna todos os usuários cadastrados (sem hash de senha). Requer papel **ADMIN**.
      responses:
        "200":
          description: Lista de usuários.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { description: "Acesso negado — papel ADMIN necessário." }

    post:
      tags: [Usuários]
      summary: Criar usuário
      description: Cria um novo usuário com bcrypt na senha. Requer papel **ADMIN**.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password, role]
              properties:
                username:
                  type: string
                  minLength: 3
                  maxLength: 32
                  pattern: '^[a-zA-Z0-9_.-]+$'
                password:
                  type: string
                  minLength: 8
                role:
                  type: string
                  enum: [ADMIN, OPERADOR, VIEWER]
            example:
              username: "operador1"
              password: "senha-segura-123"
              role: "OPERADOR"
      responses:
        "201":
          description: Usuário criado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { description: "Acesso negado — papel ADMIN necessário." }
        "409": { description: "Username já existe." }

  /api/users/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string }
        description: ID do usuário (CUID).

    get:
      tags: [Usuários]
      summary: Buscar usuário por ID
      responses:
        "200":
          description: Usuário encontrado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { description: "Acesso negado — papel ADMIN necessário." }
        "404": { $ref: "#/components/responses/NotFound" }

    put:
      tags: [Usuários]
      summary: Atualizar usuário
      description: |
        Atualiza `username`, `password` e/ou `role`. Usa optimistic locking via campo `version`:
        envie o `version` atual para detectar conflito de edição concorrente (responde 409 se divergir).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username: { type: string }
                password: { type: string, minLength: 8 }
                role: { type: string, enum: [ADMIN, OPERADOR, VIEWER] }
                version: { type: integer, description: "Versão atual do registro para optimistic locking." }
      responses:
        "200":
          description: Usuário atualizado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { description: "Acesso negado — papel ADMIN necessário." }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { description: "Conflito de versão (optimistic locking) ou username duplicado." }

    delete:
      tags: [Usuários]
      summary: Excluir usuário
      description: Remove o usuário. Não é possível excluir o próprio usuário autenticado.
      responses:
        "204": { description: "Usuário excluído com sucesso." }
        "400": { description: "Tentativa de auto-exclusão negada." }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { description: "Acesso negado — papel ADMIN necessário." }
        "404": { $ref: "#/components/responses/NotFound" }

  # ── Versão ─────────────────────────────────────────────────────────────────
  /api/counts:
    get:
      tags: [Sistema]
      summary: Contagens para a sidebar
      description: >
        Contagens leves (via count queries) de dispositivos e links para os badges
        da sidebar. Permite polling sem refazer o fetch das listas completas.
      responses:
        "200":
          description: Contagens atuais.
          content:
            application/json:
              schema:
                type: object
                properties:
                  devicesTotal: { type: integer, example: 42 }
                  devicesOffline: { type: integer, example: 3 }
                  linksOnline: { type: integer, example: 7 }
                  linksTotal: { type: integer, example: 8 }
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/version:
    get:
      tags: [Sistema]
      summary: Versão do build
      description: Retorna a versão da aplicação e o hash do commit git atual. Endpoint público.
      security: []
      responses:
        "200":
          description: Informações de versão.
          content:
            application/json:
              schema:
                type: object
                properties:
                  version: { type: string, example: "0.2.1" }
                  build: { type: integer, nullable: true, example: 194 }
                  hash: { type: string, nullable: true, example: "a3f7b2c" }

# ─── Parâmetros e respostas comuns ───────────────────────────────────────────
  parameters:
    DeviceId:
      in: path
      name: id
      required: true
      schema:
        type: string
      description: ID do dispositivo (CUID).
      example: "clxyz123456789"

    LinkId:
      in: path
      name: id
      required: true
      schema:
        type: string
      description: ID do link (CUID).
      example: "clxyz987654321"

  responses:
    Unauthorized:
      description: Não autenticado. Faça login em `/api/auth/callback/credentials`.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: "Unauthorized"

    NotFound:
      description: Recurso não encontrado.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: "Not found"

    ValidationError:
      description: Dados de entrada inválidos. Retorna o objeto de erros do Zod.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              fieldErrors:
                ip: ["Formato de IP inválido"]
                name: ["String must contain at least 1 character(s)"]
              formErrors: []
